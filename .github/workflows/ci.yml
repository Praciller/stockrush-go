name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: stockrush
          POSTGRES_USER: stockrush
          POSTGRES_PASSWORD: stockrush
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockrush -d stockrush"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://stockrush:stockrush@localhost:5432/stockrush?sslmode=disable
      TEST_DATABASE_URL: postgres://stockrush:stockrush@localhost:5432/stockrush?sslmode=disable
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Formatting
        run: test -z "$(gofmt -l cmd internal)"
      - name: Vet
        run: go vet ./...
      - name: Go vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: Unit and race tests
        run: |
          go test ./...
          go test -race ./internal/...
      - name: Migration validation
        run: go run ./cmd/migrate
      - name: PostgreSQL integration tests
        run: go test -tags=integration -p 1 ./... -count=1
      - name: Repository guardrails
        run: go run ./cmd/guardrails

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=low
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker compose config --quiet
      - run: docker compose build
      - name: Build and scan API image
        run: |
          docker build -t stockrush-api:ci .
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.72.0 image --severity HIGH,CRITICAL --exit-code 1 --no-progress stockrush-api:ci
